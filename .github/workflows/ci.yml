name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # windows-latest deliberately: the module is the on-prem Windows runtime
    # (#Requires 7.2) and tests Join-Path with backslash literals.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install PSScriptAnalyzer + Pester
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          Install-Module Pester -MinimumVersion 5.5 -Force -Scope CurrentUser -SkipPublisherCheck
      - name: Lint (PSScriptAnalyzer)
        shell: pwsh
        # Scope + settings per docs/deployment/README.md — the repo lint gate.
        run: |
          $findings = @('./src', './build') | ForEach-Object {
            Invoke-ScriptAnalyzer -Path $_ -Recurse -Settings ./PSScriptAnalyzerSettings.psd1
          }
          if ($findings) {
            $findings | Format-Table RuleName, Severity, ScriptName, Line, Message -AutoSize | Out-String | Write-Host
            exit 1
          }
          Write-Host 'PSScriptAnalyzer: clean'
      - name: Test (Pester)
        shell: pwsh
        run: Invoke-Pester ./tests -CI

      - name: Verify vector contract is in sync with the front-end canonical
        shell: pwsh
        run: ./build/Test-VectorContractSync.ps1

  claude-md:
    name: CLAUDE.md meta-policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Required CLAUDE.md meta-policy anchors present
        shell: bash
        run: |
          f=CLAUDE.md
          miss=0
          req=("What this project is" "architectural principles" "Technology stack" "Never commit secrets" "Current state" "Working agreement" "unified-security-standard.md" "docs/decision-records")
          for p in "${req[@]}"; do
            if ! grep -qiF "$p" "$f"; then echo "::error file=$f::missing required meta-policy anchor: $p"; miss=1; fi
          done
          if [ "$miss" -ne 0 ]; then exit 1; fi
          echo "CLAUDE.md: all 8 meta-policy anchors present"

  docs:
    # Documentation validation gate (CLAUDE.md §8) — mirrors the sibling repos.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Required /docs structure exists
        run: |
          required=(decision-records integrations data-governance database \
            architecture diagrams security)
          missing=0
          for d in "${required[@]}"; do
            if [ ! -d "docs/$d" ]; then
              echo "::error::Missing required docs directory: docs/$d"
              missing=1
            fi
          done
          exit $missing

  okf-sync:
    # OKF cross-repo freshness gate (front-end ADR-0104 decision 6, layer 2).
    # A PR that changes per-source bronze ingestion (which can change what feeds
    # a silver entity) must update the matching OKF concept file in ImperionCRM
    # and link it here (or label okf-sync). Excludes the OKF/semantic tooling
    # itself. Escape hatch: label okf-not-affected (justify in body).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Require an OKF concept update for bronze-ingestion changes
        env:
          BASE: ${{ github.event.pull_request.base.ref }}
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          set -euo pipefail
          git fetch origin "$BASE" -q
          changed="$(git diff --name-only "origin/$BASE...HEAD")"
          echo "Changed files:"; echo "$changed"
          relevant="$(echo "$changed" \
            | grep -E '^src/ImperionPipeline/Public/|Invoke-ImperionBronzePost\.ps1' \
            | grep -vE '/(semantic|knowledge|utility)/|\.Tests\.ps1$' || true)"
          if [ -z "$relevant" ]; then
            echo "No silver-affecting ingestion files changed - OKF gate not applicable."; exit 0
          fi
          echo "::notice::Silver-affecting ingestion files changed:"; echo "$relevant"
          case ",${LABELS}," in
            *,okf-not-affected,*) echo "Label okf-not-affected present - gate waived."; exit 0 ;;
            *,okf-sync,*)         echo "Label okf-sync present - OKF concept updated."; exit 0 ;;
          esac
          body="$(jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH")"
          if echo "$body" | grep -qiE 'markdconnelly/ImperionCRM(#|/issues/|/pull/)[0-9]+'; then
            echo "PR body links an ImperionCRM OKF issue/PR - OK."; exit 0
          fi
          echo "::error::This PR changes per-source bronze ingestion. Per front-end ADR-0104, update the matching OKF concept file in ImperionCRM and link the issue/PR here (or apply label 'okf-sync'); if it does not affect silver meaning, apply 'okf-not-affected' with a justification in the PR body."
          exit 1
